<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Hệ thống Quản lý Lớp học</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at top right, #eef2ff, #f8fafc); min-height: 100vh; display: flex; align-items: center; font-family: 'Inter', sans-serif; }
        .login-card { border: 1px solid rgba(255,255,255,0.7); border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.08); background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); }
        .btn-login { background: #4f46e5; border: none; padding: 14px; font-weight: 600; border-radius: 12px; transition: all 0.3s; }
        .btn-login:hover { background: #4338ca; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4); transform: translateY(-2px); }
        .input-group-text { background-color: #fff; border-right: none; color: #adb5bd; }
        .form-control { border-left: none; padding: 12px; border-radius: 0 12px 12px 0 !important; }
        .input-group-text { border-radius: 12px 0 0 12px !important; }
        .form-control:focus { box-shadow: none; border-color: #4f46e5; }
        .brand-logo { color: #4f46e5; font-size: 2.2rem; font-weight: 800; letter-spacing: -1.5px; }
        .message-container { position: fixed; top: 20px; left: 20px; z-index: 9999; min-width: 300px; }
    </style>
</head>
<body>
    <!-- Vùng thông báo đồng nhất với hệ thống -->
    <div class="message-container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} alert-dismissible fade show shadow-lg border-0" role="alert">
                    <div class="d-flex align-items-center">
                        <i class="fas {% if message.tags == 'error' %}fa-exclamation-circle{% else %}fa-check-circle{% endif %} me-2"></i>
                        <div>{{ message }}</div>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card login-card p-4">
                    <div class="text-center mb-4">
                        <div class="brand-logo mb-2"><i class="fas fa-graduation-cap"></i> EDUPRO</div>
                        <p class="text-secondary small fw-bold text-uppercase">Quản lý trung tâm đào tạo</p>
                    </div>

                    <form method="POST" novalidate>
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Tên đăng nhập</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                {{ form.username }}
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Mật khẩu</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                {{ form.password }}
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-login text-white">ĐĂNG NHẬP</button>
                    </form>

                    <div class="text-center mt-3">
                        <a href="{% url 'forgot_password' %}" class="small text-decoration-none">Quên mật khẩu?</a>
                    </div>
                    <div class="text-center mt-2">
                        <small class="text-muted">Chưa có tài khoản? Vui lòng liên hệ Admin.</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Tự động tắt thông báo sau 3 giây giống bên trong hệ thống
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                let alerts = document.querySelectorAll('.message-container .alert');
                alerts.forEach(function(alert) {
                    let bsAlert = new bootstrap.Alert(alert);
                    bsAlert.close();
                });
            }, 3000);
        });
    </script>
</body>
</html>
